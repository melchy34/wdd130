<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WWR Rafting | Contact Us</title>

    <meta name="description"
      content="Learn about WWR Rafting, our mission, history, and adventures waiting for you.">
    <meta name="author" content="Uzukwu Chukwugoziri Melchiades">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <!-- Header -->
    <header>
        <!-- Logo -->
        <img src="images/wwr-logo.png" alt="WWR Rafting Logo" class="logo">

        <!-- Navigation -->
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <h1>Contact Us</h1>

        <!-- Company Info -->
        <section class="company-info">
            <h2>Our Office</h2>
            <p><strong>Address:</strong> 123 River Road, Adventure Town, State, Country</p>
            <p><strong>Phone:</strong> +1 (555) 123-4567</p>
            <p><strong>Email:</strong> info@wwrrafting.com</p>

            <!-- Embedded Google Map -->
            <iframe src="https://www.google.com/maps/embed?pb=…" class="map" allowfullscreen=""
              loading="lazy" referrerpolicy="no-referrer-when-downgrade"
              title="WWR Rafting Location">
            </iframe>
        </section>

        <!-- Contact Form -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">

                <!-- Name -->
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>

                <!-- Email -->
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required>

                <!-- Purpose (Radio Buttons) -->
                <fieldset>
                    <legend>Purpose of Your Message:</legend>
                    <input type="radio" id="general" name="purpose" value="General Inquiry"
                      required>
                    <label for="general">General Inquiry</label><br>

                    <input type="radio" id="reservation" name="purpose"
                      value="Reservation Question">
                    <label for="reservation">Reservation Question</label><br>

                    <input type="radio" id="website" name="purpose" value="Website Suggestion">
                    <label for="website">Website Suggestion</label>
                </fieldset>

                <!-- Message -->
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <!-- Newsletter Checkbox -->
                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Please subscribe me to the monthly newsletter</label><br>

                <!-- Submit Button -->
                <button type="submit">Send Message</button>

            </form>
        </section>

        <!-- Employee Profiles -->
        <section class="employees">
            <h2>Meet Our Team</h2>
            <figure>
                <img src="images/employee1.jpeg" alt="John Doe - Guide">
                <figcaption>John Doe - Lead Rafting Guide</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.jpg" alt="Jane Smith - Operations Manager">
                <figcaption>Jane Smith - Operations Manager</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.jpg" alt="Alex Brown - Safety Officer">
                <figcaption>Alex Brown - Safety Officer</figcaption>
            </figure>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 WWR Rafting | Uzukwu Chukwugoziri Melchiades</p>

        <!-- Social Media Links -->
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank"><img src="images/facebook-icon.png"
                  alt="Facebook"></a>
            <a href="https://linkedin.com" target="_blank"><img src="images/linkedin-icon.png"
                  alt="LinkedIn"></a>
            <a href="https://twitter.com" target="_blank"><img src="images/twitter-icon.png"
                  alt="Twitter"></a>
        </nav>
    </footer>

</body>

</html>
