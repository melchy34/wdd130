<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <h1>Basic HTML and CSS Quiz</h1>

    <form action="#" method="post">

        <!-- Question 1: Text Input -->
        <div>
            <label for="q1">1. What does HTML stand for?</label><br>
            <input type="text" id="q1" name="q1" required>
        </div>

        <br>

        <!-- Question 2: Textarea -->
        <div>
            <label for="q2">2. Briefly explain the purpose of CSS:</label><br>
            <textarea id="q2" name="q2" rows="4" cols="40" required></textarea>
        </div>

        <br>

        <!-- Question 3: Select Dropdown -->
        <div>
            <label for="q3">3. Which CSS property is used to change text color?</label><br>
            <select id="q3" name="q3" required>
                <option value="" selected disabled>Choose One ...</option>
                <option value="font-style">font-style</option>
                <option value="color">color</option>
                <option value="background-color">background-color</option>
            </select>
        </div>

        <br>

        <!-- Question 4: Number Input -->
        <div>
            <label for="q4">4. How many heading levels are there in HTML (h1 to h6)?</label><br>
            <input type="number" id="q4" name="q4" min="1" max="10" required>
        </div>

        <br>

        <!-- Submit Button -->
        <div>
            <button type="submit">Submit Quiz</button>
        </div>

    </form>

</body>

</html>
